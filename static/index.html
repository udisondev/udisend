<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Чат на htmx</title>
  
  <script src="https://unpkg.com/htmx.org@1.9.2"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    .container { display: flex; height: 100vh; }
    .sidebar {
      width: 250px;
      background: #f0f0f0;
      border-right: 1px solid #ccc;
      padding: 10px;
      overflow-y: auto;
    }
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .chat-history {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      border-bottom: 1px solid #ccc;
    }
    .chat-input {
      padding: 10px;
    }
    .chat-input textarea {
      width: 100%;
      height: 60px;
      resize: none;
      padding: 5px;
    }
    .chat-input button {
      margin-top: 5px;
      padding: 8px 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="sidebar" id="userList"
         hx-get="/chat/users"           
         hx-trigger="load, every 5s"     
         hx-swap="innerHTML">            
      <h3>Пользователи</h3>
      <ul>
        <li>Пользователь1</li>
        <li>Пользователь2</li>
        <li>Пользователь3</li>
      </ul>
    </div>
    
    <div class="chat-area">
      
      <div class="chat-history" id="chatHistory"
           hx-get="/chat/messages"          
           hx-trigger="load, every 1s"       
           hx-swap="beforeend">              
        
      </div>
      
      <div class="chat-input">
        <form hx-post="/chat/send"         
              hx-trigger="submit"          
              hx-target="#chatHistory"     
              hx-swap="beforeend">         
          <textarea name="message" placeholder="Введите сообщение..."></textarea>
          <button type="submit">Отправить</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
