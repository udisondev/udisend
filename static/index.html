<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Чат на htmx</title>
  <!-- Подключение htmx -->
  <script src="https://unpkg.com/htmx.org@1.9.2"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    .container { display: flex; height: 100vh; }
    .sidebar {
      width: 250px;
      background: #f0f0f0;
      border-right: 1px solid #ccc;
      padding: 10px;
      overflow-y: auto;
    }
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .chat-history {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      border-bottom: 1px solid #ccc;
    }
    .chat-input {
      padding: 10px;
    }
    .chat-input textarea {
      width: 100%;
      height: 60px;
      resize: none;
      padding: 5px;
    }
    .chat-input button {
      margin-top: 5px;
      padding: 8px 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Левая колонка со списком пользователей -->
    <div class="sidebar" id="userList"
         hx-get="/chat/users"           <!-- URL для получения списка пользователей -->
         hx-trigger="load, every 5s"     <!-- Обновление при загрузке и каждые 5 секунд -->
         hx-swap="innerHTML">            <!-- Обновление содержимого списка -->
      <h3>Пользователи</h3>
      <ul>
        <li>Пользователь1</li>
        <li>Пользователь2</li>
        <li>Пользователь3</li>
      </ul>
    </div>
    <!-- Правая часть: область переписки и ввод сообщения -->
    <div class="chat-area">
      <!-- Область переписки -->
      <div class="chat-history" id="chatHistory"
           hx-get="/chat/messages"          <!-- URL для получения сообщений -->
           hx-trigger="load, every 5s"       <!-- Автоматическое обновление при загрузке и каждые 5 секунд -->
           hx-swap="beforeend">              <!-- Добавление новых сообщений в конец -->
        <!-- Здесь будут динамически подгружаться сообщения -->
      </div>
      <!-- Форма ввода сообщения -->
      <div class="chat-input">
        <form hx-post="/chat/send"         <!-- URL для отправки сообщений -->
              hx-trigger="submit"          <!-- Отправка формы при сабмите -->
              hx-target="#chatHistory"     <!-- Цель обновления - область переписки -->
              hx-swap="beforeend">         <!-- Добавление нового сообщения в конец переписки -->
          <textarea name="message" placeholder="Введите сообщение..."></textarea>
          <button type="submit">Отправить</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
